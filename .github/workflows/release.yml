name: release

# Fires when release.sh publishes a GitHub Release. release.sh bundles
# and attaches the x86_64 Linux tarball itself; this workflow adds the
# Flatpak bundle as an extra asset on the same release.
on:
  release:
    types: [published]

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: dev.tensaku.Tensaku.yml
          bundle: tensaku-${{ github.ref_name }}.flatpak
          branch: ${{ github.ref_name }}
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Attach Flatpak to the release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: tensaku-${{ github.ref_name }}.flatpak
